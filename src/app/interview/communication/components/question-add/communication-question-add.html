<!-- communication-question-add.html (Creator - Step-by-step question builder) -->

<!-- Background -->
<div class="builder-bg">
  <div class="grid-overlay"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
</div>

<div class="builder-wrapper">

  <!-- ── Page Header ── -->
  <div class="page-header">
    <div>
      <div class="page-eyebrow">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        Communication Test Builder
      </div>
      <h1 class="page-title">Question {{ step }} <span class="title-sep">/</span> {{ totalQuestions }}</h1>
      <p class="page-sub">Add the question text, difficulty and time limit for this question</p>
    </div>

    <!-- Step Progress -->
    <div class="step-badge">
      <div class="step-track">
        <div class="step-fill" [style.width]="(step / totalQuestions * 100) + '%'"></div>
      </div>
      <span class="step-text">Step {{ step }} of {{ totalQuestions }}</span>
    </div>
  </div>

  <!-- ── Question Card ── -->
  <div class="section-card">
    <div class="section-card-header">
      <div class="section-icon icon-q">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
      </div>
      <h2 class="section-title">Question Details</h2>
    </div>

    <form [formGroup]="questionForm" class="section-form">

      <!-- Question Text -->
      <div class="field-group">
        <label class="field-label">Question</label>
        <textarea
          formControlName="questionText"
          rows="5"
          class="field-textarea"
          placeholder="e.g. Tell me about yourself and your background. What motivated you to apply for this role?"></textarea>
        <div class="field-error" *ngIf="questionForm.get('questionText')?.touched && questionForm.get('questionText')?.invalid">
          Question must be at least 10 characters
        </div>
      </div>

      <!-- Difficulty -->
      <div class="field-group">
        <label class="field-label">Difficulty</label>
        <div class="diff-chips">
          <button type="button" class="diff-chip"
            *ngFor="let d of difficulties"
            (click)="questionForm.get('difficultyLevel')?.setValue(d.value)"
            [class.diff-easy]="d.value === 'EASY'   && questionForm.get('difficultyLevel')?.value === d.value"
            [class.diff-medium]="d.value === 'MEDIUM' && questionForm.get('difficultyLevel')?.value === d.value"
            [class.diff-hard]="d.value === 'HARD'   && questionForm.get('difficultyLevel')?.value === d.value"
            [class.diff-active]="questionForm.get('difficultyLevel')?.value === d.value">
            {{ d.emoji }} {{ d.label }}
          </button>
        </div>
      </div>

      <!-- Time Limit -->
      <div class="field-group">
        <label class="field-label">Response Time Limit (seconds)</label>
        <div class="input-wrapper">
          <span class="input-icon">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
            </svg>
          </span>
          <input type="number" formControlName="timeLimit" class="field-input" placeholder="120"/>
        </div>
      </div>

      <!-- Category -->
      <div class="field-group">
        <label class="field-label">Category</label>
        <div class="input-wrapper">
          <span class="input-icon">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/>
              <line x1="7" y1="7" x2="7.01" y2="7"/>
            </svg>
          </span>
          <select formControlName="category" class="field-input">
            <option value="" disabled>Select category</option>
            <option *ngFor="let cat of categories" [value]="cat.value">{{ cat.label }}</option>
          </select>
        </div>
      </div>

      <!-- Save Button -->
      <button type="button" class="btn-save-q" (click)="saveQuestion()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
          <polyline points="17 21 17 13 7 13 7 21"/>
          <polyline points="7 3 7 8 15 8"/>
        </svg>
        {{ questionId ? 'Update Question' : 'Save Question' }}
      </button>

    </form>
  </div>

  <!-- ── Navigation Row ── -->
  <div class="nav-row">
    <button class="btn-ghost" *ngIf="step > 1" (click)="previousStep()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 5l-7 7 7 7"/>
      </svg>
      Previous
    </button>
    <div class="nav-spacer" *ngIf="step <= 1"></div>
    <button class="btn-next" (click)="nextStep()">
      {{ step === totalQuestions ? 'Finish & Go to Dashboard' : 'Next Question' }}
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12h14M12 5l7 7-7 7"/>
      </svg>
    </button>
  </div>

</div>
