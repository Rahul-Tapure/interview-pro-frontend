<!-- communication-edit-test.html (Creator - View Test) -->

<!-- Background -->
<div class="home-bg">
  <div class="grid-overlay"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
</div>

<div class="edit-wrapper">

  <!-- Loading State -->
  <div class="loading-state" *ngIf="loading">
    <div class="btn-spinner"></div>
    <span>Loading test...</span>
  </div>

  <!-- Error State -->
  <div class="error-banner" *ngIf="error">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/>
      <line x1="12" y1="8" x2="12" y2="12"/>
      <line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
    {{ error }}
  </div>

  <ng-container *ngIf="test && !loading">

    <!-- ── Page Header ── -->
    <div class="page-header">
      <div class="header-left">
        <div class="page-eyebrow">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
          Creator Workspace
        </div>
        <h1 class="page-title">{{ test.title }}</h1>
        <p class="page-sub">{{ test.description || 'No description' }} · {{ test.totalQuestions }} questions</p>
      </div>
    </div>

    <!-- ── Questions List ── -->
    <div class="section-card" *ngFor="let q of test.questions; let i = index">
      <div class="section-card-header">
        <div class="section-icon icon-q">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/>
          </svg>
        </div>
        <h2 class="section-title">Question {{ i + 1 }}</h2>
        <div class="question-meta">
          <span class="meta-badge" *ngIf="q.difficultyLevel">{{ q.difficultyLevel }}</span>
          <span class="meta-badge" *ngIf="q.category">{{ q.category }}</span>
          <span class="meta-badge">{{ q.timeLimit }}s</span>
        </div>
      </div>
      <div class="question-body">
        <p class="question-text">{{ q.questionText }}</p>
      </div>
    </div>

    <!-- ── Back Button ── -->
    <div class="nav-row">
      <button class="btn-ghost" (click)="goBack()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 5l-7 7 7 7"/>
        </svg>
        Back to Dashboard
      </button>
    </div>

  </ng-container>

</div>
