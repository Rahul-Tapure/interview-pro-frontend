<!-- resume-result.component.html -->

<!-- Animated Background -->
<div class="home-bg">
  <div class="grid-overlay"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<div class="home-wrapper">

  <!-- Loading State -->
  <div class="result-loading" *ngIf="!result">
    <div class="spinner"></div>
    <p>Analyzing your resume...</p>
  </div>

  <!-- Result Content -->
  <div class="result-wrapper" *ngIf="result">

    <div class="result-card">

      <!-- Title -->
      <h2 class="result-title">
        Resume Analysis <span class="gradient-text">Report</span>
      </h2>

      <!-- Target Role Badge (if available) -->
      <div class="role-badge-row" *ngIf="result.roles">
        <span class="role-badge">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          {{ result.roles }}
        </span>
      </div>

      <!-- Score Section -->
      <div class="score-section">
        <div class="score-box">
          <span class="score-label">Overall Score</span>
          <span class="score-value gradient-text">
            {{ result.score }}/100
          </span>
          <div class="score-bar">
            <div class="score-fill" [style.width.%]="result.score"></div>
          </div>
        </div>

        <div class="score-box">
          <span class="score-label">ATS Optimization</span>
          <span class="score-value gradient-text">
            {{ result.atsOptimizationScore }}/100
          </span>
          <div class="score-bar">
            <div class="score-fill" [style.width.%]="result.atsOptimizationScore"></div>
          </div>
        </div>
      </div>

      <!-- Strengths -->
      <div class="analysis-block" *ngIf="result.pros && result.pros.length > 0">
        <h3 class="block-title positive">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          Strengths
        </h3>
        <ul>
          <li *ngFor="let p of result.pros">{{ p }}</li>
        </ul>
      </div>

      <!-- Weaknesses -->
      <div class="analysis-block" *ngIf="result.cons && result.cons.length > 0">
        <h3 class="block-title negative">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
            <line x1="12" y1="9" x2="12" y2="13"/>
            <line x1="12" y1="17" x2="12.01" y2="17"/>
          </svg>
          Areas for Improvement
        </h3>
        <ul>
          <li *ngFor="let c of result.cons">{{ c }}</li>
        </ul>
      </div>

      <!-- Suggestions -->
      <div class="analysis-block" *ngIf="result.suggestions && result.suggestions.length > 0">
        <h3 class="block-title neutral">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
          </svg>
          AI Recommendations
        </h3>
        <ol>
          <li *ngFor="let s of result.suggestions">{{ s }}</li>
        </ol>
      </div>

      <!-- Action Buttons -->
      <div class="result-actions">
        <button class="btn-back" (click)="goBack()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5M12 5l-7 7 7 7"/>
          </svg>
          Back to Dashboard
        </button>
        
        <button class="btn-download" (click)="downloadReport()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Download Report
        </button>
      </div>

    </div>

  </div>

</div>
