<!-- login.component.html -->

<!-- Background -->
<div class="login-bg">
  <div class="grid-overlay"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
</div>

<div class="login-wrapper">
  <div class="login-card">

    <!-- Top Icon -->
    <div class="card-icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
        <polyline points="10 17 15 12 10 7"/>
        <line x1="15" y1="12" x2="3" y2="12"/>
      </svg>
    </div>

    <h2 class="card-title">Welcome Back</h2>
    <p class="card-sub">Sign in to continue your interview preparation</p>

    <form [formGroup]="loginForm" (ngSubmit)="submit()" class="login-form" novalidate>

      <!-- Email -->
      <div class="field-group">
        <label class="field-label">Email Address</label>
        <div class="input-wrapper" [class.input-error]="f['email'].touched && f['email'].invalid" [class.input-valid]="f['email'].touched && f['email'].valid">
          <span class="input-icon">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
          </span>
          <input
            type="email"
            formControlName="email"
            class="field-input"
            placeholder="you@example.com"
            autocomplete="email"
          />
        </div>
        <div class="field-errors" *ngIf="f['email'].touched && f['email'].invalid">
          <span *ngIf="f['email'].errors?.['required']" class="error-msg">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            Email is required
          </span>
          <span *ngIf="f['email'].errors?.['email']" class="error-msg">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            Invalid email format
          </span>
        </div>
      </div>

      <!-- Password -->
      <div class="field-group">
        <div class="label-row">
          <label class="field-label">Password</label>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>
        <div class="input-wrapper" [class.input-error]="f['password'].touched && f['password'].invalid" [class.input-valid]="f['password'].touched && f['password'].valid">
          <span class="input-icon">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </span>
          <input
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            class="field-input"
            placeholder="Enter your password"
            autocomplete="current-password"
          />
          <button type="button" class="toggle-pass" (click)="showPassword = !showPassword">
            <svg *ngIf="!showPassword" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
            <svg *ngIf="showPassword" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
        <div class="field-errors" *ngIf="f['password'].touched && f['password'].invalid">
          <span class="error-msg">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            Password is required
          </span>
        </div>
      </div>

      <!-- Server Error -->
      <div class="server-error" *ngIf="errorMessage">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
          <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
        {{ errorMessage }}
      </div>

      <!-- Submit -->
      <button type="submit" class="submit-btn" [disabled]="loading" [class.btn-loading]="loading">
        <span class="btn-spinner" *ngIf="loading"></span>
        <span *ngIf="!loading">Sign In</span>
        <span *ngIf="loading">Signing in...</span>
        <svg *ngIf="!loading" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </button>

    </form>

    <!-- Footer -->
    <p class="card-footer">
      Don't have an account?
      <a routerLink="/register" class="footer-link">Create one →</a>
    </p>

  </div>
</div>
