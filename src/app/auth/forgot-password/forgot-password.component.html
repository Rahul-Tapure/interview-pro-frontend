<div class="auth-wrapper">
  <div class="auth-card">
    <h2>Forgot Password</h2>
    <p class="subtitle">Enter your email and we will send an OTP.</p>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <label for="email">Email</label>
      <input
        id="email"
        type="email"
        formControlName="email"
        placeholder="you@example.com"
        autocomplete="email"
      />
      <div class="field-error" *ngIf="f['email'].touched && f['email'].invalid">
        <span *ngIf="f['email'].errors?.['required']">Email is required.</span>
        <span *ngIf="f['email'].errors?.['email']">Enter a valid email.</span>
      </div>

      <div class="message success" *ngIf="successMessage">{{ successMessage }}</div>
      <div class="message error" *ngIf="errorMessage">{{ errorMessage }}</div>

      <button type="submit" [disabled]="loading">
        <span *ngIf="!loading">Send OTP</span>
        <span *ngIf="loading">Sending...</span>
      </button>
    </form>

    <p class="back-link">
      Remembered your password?
      <a routerLink="/login">Back to Login</a>
    </p>
  </div>
</div>
