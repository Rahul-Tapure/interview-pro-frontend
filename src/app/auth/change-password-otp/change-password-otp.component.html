<div class="auth-wrapper">
  <div class="auth-card">
    <h2>{{ pageTitle }}</h2>
    <p class="subtitle">{{ pageSubtitle }}</p>

    <div class="section">
      <h3>1. Request OTP</h3>
      <form [formGroup]="requestForm" (ngSubmit)="requestOtp()" novalidate>
        <label for="email">Email</label>
        <input id="email" type="email" formControlName="email" autocomplete="email" placeholder="you@example.com" />
        <div class="field-error" *ngIf="rf['email'].touched && rf['email'].invalid">
          <span *ngIf="rf['email'].errors?.['required']">Email is required.</span>
          <span *ngIf="rf['email'].errors?.['email']">Enter a valid email.</span>
        </div>
        <button type="submit" [disabled]="loadingRequest">
          <span *ngIf="!loadingRequest">Send OTP</span>
          <span *ngIf="loadingRequest">Sending...</span>
        </button>
      </form>
    </div>

    <div class="section" *ngIf="otpSent">
      <h3>2. Verify OTP & Change Password</h3>
      <form [formGroup]="verifyForm" (ngSubmit)="verifyAndChangePassword()" novalidate>
        <label for="verifyEmail">Email</label>
        <input id="verifyEmail" type="email" formControlName="email" autocomplete="email" />

        <label for="otp">OTP</label>
        <input id="otp" type="text" formControlName="otp" autocomplete="one-time-code" placeholder="Enter OTP" />

        <label for="newPassword">New Password</label>
        <input id="newPassword" type="password" formControlName="newPassword" autocomplete="new-password" />

        <label for="confirmPassword">Confirm Password</label>
        <input id="confirmPassword" type="password" formControlName="confirmPassword" autocomplete="new-password" />

        <div class="field-error" *ngIf="vf['newPassword'].touched && vf['newPassword'].errors?.['minlength']">
          Password must be at least 8 characters.
        </div>

        <button type="submit" [disabled]="loadingVerify">
          <span *ngIf="!loadingVerify">Verify OTP & Update Password</span>
          <span *ngIf="loadingVerify">Updating...</span>
        </button>
      </form>
    </div>

    <div class="message success" *ngIf="successMessage">{{ successMessage }}</div>
    <div class="message error" *ngIf="errorMessage">{{ errorMessage }}</div>

    <p class="back-link"><a [routerLink]="backRoute">{{ backLabel }}</a></p>
  </div>
</div>
