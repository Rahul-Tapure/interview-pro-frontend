<div class="auth-wrapper">
  <div class="auth-card">
    <h2>Reset Password</h2>
    <p class="subtitle">Set your new password to continue.</p>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <label for="newPassword">New Password</label>
      <div class="password-wrap">
        <input
          id="newPassword"
          [type]="showPassword ? 'text' : 'password'"
          formControlName="newPassword"
          autocomplete="new-password"
          placeholder="Minimum 8 characters"
        />
        <button type="button" class="eye-btn" (click)="showPassword = !showPassword">
          {{ showPassword ? 'Hide' : 'Show' }}
        </button>
      </div>
      <div class="field-error" *ngIf="f['newPassword'].touched && f['newPassword'].invalid">
        <span *ngIf="f['newPassword'].errors?.['required']">New password is required.</span>
        <span *ngIf="f['newPassword'].errors?.['minlength']">Use at least 8 characters.</span>
      </div>

      <label for="confirmPassword">Confirm Password</label>
      <div class="password-wrap">
        <input
          id="confirmPassword"
          [type]="showConfirmPassword ? 'text' : 'password'"
          formControlName="confirmPassword"
          autocomplete="new-password"
          placeholder="Re-enter new password"
        />
        <button type="button" class="eye-btn" (click)="showConfirmPassword = !showConfirmPassword">
          {{ showConfirmPassword ? 'Hide' : 'Show' }}
        </button>
      </div>
      <div class="field-error" *ngIf="f['confirmPassword'].touched && f['confirmPassword'].invalid">
        <span>Confirm password is required.</span>
      </div>

      <div class="message success" *ngIf="successMessage">{{ successMessage }}</div>
      <div class="message error" *ngIf="errorMessage">{{ errorMessage }}</div>

      <button type="submit" [disabled]="loading || !token">
        <span *ngIf="!loading">Reset Password</span>
        <span *ngIf="loading">Resetting...</span>
      </button>
    </form>

    <p class="back-link">
      <a routerLink="/login">Back to Login</a>
    </p>
  </div>
</div>
